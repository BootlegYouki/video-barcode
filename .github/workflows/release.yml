name: Release Marigold (Android & iOS)

on:
  workflow_dispatch:

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump_version.outputs.version }}
      sha: ${{ steps.git_push.outputs.sha }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-increment version in app.json
        id: bump_version
        run: |
          node -e "
            const fs = require('fs');
            const app = require('./app.json');
            
            // Increment version string
            const currentVersion = app.expo.version || '1.0.0';
            const parts = currentVersion.split('.').map(Number);
            if (parts.length === 3) {
              parts[2] += 1;
            } else {
              parts.push(1);
            }
            const nextVersion = parts.join('.');
            app.expo.version = nextVersion;

            // Increment android versionCode
            if (!app.expo.android) {
              app.expo.android = {};
            }
            const currentVersionCode = app.expo.android.versionCode || 1;
            const nextVersionCode = currentVersionCode + 1;
            app.expo.android.versionCode = nextVersionCode;

            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('Next version calculated:', nextVersion);
            console.log('Next versionCode calculated:', nextVersionCode);
            
            // Output to GitHub Actions Outputs
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + nextVersion + '\n');
          "

      - name: Commit and push updated app.json
        id: git_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump version to v${{ steps.bump_version.outputs.version }} [skip ci]"
          git push origin HEAD:main
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build-android:
    name: Build Android APK
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Env File
        run: |
          echo "EXPO_PUBLIC_WEB_CLIENT=${{ secrets.EXPO_PUBLIC_WEB_CLIENT }}" >> .env
          echo "EXPO_PUBLIC_ANDROID_CLIENT=${{ secrets.EXPO_PUBLIC_ANDROID_CLIENT }}" >> .env
          echo "EXPO_PUBLIC_IOS_CLIENT=${{ secrets.EXPO_PUBLIC_IOS_CLIENT }}" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Generate Android folder)
        run: npx expo prebuild --platform android --clean

      - name: Configure ABI Splits for Android Build
        run: node scripts/configure-splits.js

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK Artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-arm64-v8a-release.apk Marigold-arm64-v8a.apk
          cp android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk Marigold-armeabi-v7a.apk
          cp android/app/build/outputs/apk/release/app-x86_64-release.apk Marigold-x86_64.apk

      - name: Create GitHub Release (Android)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}-android
          name: Marigold v${{ needs.bump-version.outputs.version }} (Android)
          body: |
            ## Marigold v${{ needs.bump-version.outputs.version }} (Android Release)
            
            ### Android Installation
            Download the appropriate APK for your device:
            * **`Marigold-arm64-v8a.apk`** (Recommended - for modern 64-bit phones & tablets)
            * **`Marigold-armeabi-v7a.apk`** (For older 32-bit devices)
            * **`Marigold-x86_64.apk`** (For Android Emulators / ChromeOS devices)
          files: |
            Marigold-arm64-v8a.apk
            Marigold-armeabi-v7a.apk
            Marigold-x86_64.apk
          draft: false
          prerelease: false

  build-ios:
    name: Build iOS IPA
    needs: bump-version
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Create Env File
        run: |
          echo "EXPO_PUBLIC_WEB_CLIENT=${{ secrets.EXPO_PUBLIC_WEB_CLIENT }}" >> .env
          echo "EXPO_PUBLIC_ANDROID_CLIENT=${{ secrets.EXPO_PUBLIC_ANDROID_CLIENT }}" >> .env
          echo "EXPO_PUBLIC_IOS_CLIENT=${{ secrets.EXPO_PUBLIC_IOS_CLIENT }}" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Patch Podfile to use FFmpeg Kit mirror
        run: |
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('ios/Podfile', 'utf8');
            const line = \"pod 'ffmpeg-kit-ios-full', :podspec => 'https://raw.githubusercontent.com/luthviar/ffmpeg-kit-ios-full/main/ffmpeg-kit-ios-full.podspec'\";
            if (!content.includes(line)) {
              content = content.replace('use_expo_modules!', line + '\n\n  use_expo_modules!');
              fs.writeFileSync('ios/Podfile', content, 'utf8');
            }
          "

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build Unsigned App
        run: |
          cd ios
          xcodebuild -workspace Marigold.xcworkspace \
            -scheme Marigold \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into IPA
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir Payload
          mv Marigold.app Payload/
          zip -qr ../../../../../Marigold.ipa Payload

      - name: Generate SideStore source.json
        run: |
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          cat > sidestore.json << EOF
          {
            "name": "Marigold",
            "identifier": "com.bootlegyouki.marigold.source",
            "apps": [
              {
                "name": "Marigold",
                "bundleIdentifier": "com.bootlegyouki.marigold",
                "developerName": "BootlegYouki",
                "version": "${{ needs.bump-version.outputs.version }}",
                "versionDate": "${DATE}",
                "downloadURL": "https://github.com/${REPO}/releases/download/v${{ needs.bump-version.outputs.version }}-ios/Marigold.ipa",
                "localizedDescription": "Marigold barcode scanner app.",
                "iconURL": "https://raw.githubusercontent.com/${REPO}/main/assets/icon.png",
                "tintColor": "4F46E5",
                "size": 0
              }
            ]
          }
          EOF

      - name: Create GitHub Release (iOS)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}-ios
          name: Marigold v${{ needs.bump-version.outputs.version }} (iOS)
          body: |
            ## Marigold v${{ needs.bump-version.outputs.version }} (iOS Release)
            
            ### iOS Sideloading (SideStore / Sideloadly / AltStore)
            Download `Marigold.ipa` below and sideload it.
            
            ### SideStore Source URL
            Add this source to SideStore for auto-updates:
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/sidestore.json
            ```
          files: |
            Marigold.ipa
            sidestore.json
          draft: false
          prerelease: false

      - name: Commit and push updated sidestore.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sidestore.json
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop
          git add sidestore.json
          git diff --staged --quiet || git commit -m "chore: update sidestore.json for v${{ needs.bump-version.outputs.version }} [skip ci]"
          git push origin HEAD:main
